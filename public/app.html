<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Padrón Electoral - Control Panel</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/css/style.css">
  <meta name="theme-color" content="#0f172a">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased selection:bg-blue-500 selection:text-white">
  
  <header class="fixed top-0 left-0 md:left-64 right-0 z-40 bg-slate-900/80 backdrop-blur-xl border-b border-slate-800/80 px-6 py-4 flex items-center justify-between shadow-lg shadow-slate-950/20">
    <h1 class="font-extrabold tracking-tight text-lg bg-gradient-to-r from-blue-400 via-indigo-300 to-purple-400 bg-clip-text text-transparent uppercase">
      Padrón Electoral
    </h1>
    <div class="flex items-center gap-3">
      <div id="userDisplay" class="px-4 py-2 bg-slate-800/80 hover:bg-slate-700/80 border border-slate-700/60 rounded-xl text-xs font-semibold text-slate-200 transition-all duration-150 flex items-center gap-2 cursor-pointer shadow-inner">
        <!-- User dynamic details -->
      </div>
    </div>
  </header>

  <!-- Offline status notification -->
  <div id="offlineBanner" class="fixed top-[61px] left-0 md:left-64 right-0 z-40 bg-gradient-to-r from-amber-500 to-orange-600 text-white text-center py-2 text-xs font-bold tracking-wider shadow-md hidden">
    MODO OFFLINE &bull; Los datos locales se sincronizarán al recuperar la conexión.
  </div>

  <!-- Responsive Navigation -->
  <nav class="app-nav fixed bottom-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-xl border-t border-slate-800/80 flex justify-around py-1.5 px-2 md:top-0 md:bottom-0 md:right-auto md:left-0 md:w-64 md:flex-col md:justify-start md:py-20 md:px-4 md:border-r md:border-t-0" id="appNav">
    <div class="hidden md:flex flex-col items-center mb-8 px-4 text-center">
      <div class="p-3 bg-blue-500/10 border border-blue-500/20 rounded-2xl mb-3 text-blue-400">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
      </div>
      <div class="text-sm font-bold tracking-wide text-slate-200">MENU PRINCIPAL</div>
      <div class="text-[10px] text-slate-500 mt-0.5">Control Electoral</div>
    </div>

    <div class="flex md:flex-col justify-around w-full gap-1 md:gap-1.5">
      <button data-page="dashboard" class="flex flex-col items-center justify-center gap-1 py-1 px-3 text-[10px] md:text-sm font-medium text-slate-400 hover:text-slate-200 transition-all rounded-xl cursor-pointer flex-1 md:flex-none md:flex-row md:justify-start md:gap-3.5 md:py-3 md:px-4 md:w-full group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Inicio</span>
      </button>
      <button data-page="electores" class="flex flex-col items-center justify-center gap-1 py-1 px-3 text-[10px] md:text-sm font-medium text-slate-400 hover:text-slate-200 transition-all rounded-xl cursor-pointer flex-1 md:flex-none md:flex-row md:justify-start md:gap-3.5 md:py-3 md:px-4 md:w-full group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Electores</span>
      </button>
      <button data-page="cargar" class="flex flex-col items-center justify-center gap-1 py-1 px-3 text-[10px] md:text-sm font-medium text-slate-400 hover:text-slate-200 transition-all rounded-xl cursor-pointer flex-1 md:flex-none md:flex-row md:justify-start md:gap-3.5 md:py-3 md:px-4 md:w-full group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span>Cargar</span>
      </button>
      <button data-page="mesas" class="flex flex-col items-center justify-center gap-1 py-1 px-3 text-[10px] md:text-sm font-medium text-slate-400 hover:text-slate-200 transition-all rounded-xl cursor-pointer flex-1 md:flex-none md:flex-row md:justify-start md:gap-3.5 md:py-3 md:px-4 md:w-full group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Mesas</span>
      </button>
      <button data-page="mapa" class="flex flex-col items-center justify-center gap-1 py-1 px-3 text-[10px] md:text-sm font-medium text-slate-400 hover:text-slate-200 transition-all rounded-xl cursor-pointer flex-1 md:flex-none md:flex-row md:justify-start md:gap-3.5 md:py-3 md:px-4 md:w-full group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 21 18 21 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        <span>Mapa</span>
      </button>
      <button data-page="logistica" class="flex flex-col items-center justify-center gap-1 py-1 px-3 text-[10px] md:text-sm font-medium text-slate-400 hover:text-slate-200 transition-all rounded-xl cursor-pointer flex-1 md:flex-none md:flex-row md:justify-start md:gap-3.5 md:py-3 md:px-4 md:w-full group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <span>Logística</span>
      </button>
      <button data-page="emergencia" class="flex flex-col items-center justify-center gap-1 py-1 px-3 text-[10px] md:text-sm font-medium text-slate-400 hover:text-slate-200 transition-all rounded-xl cursor-pointer flex-1 md:flex-none md:flex-row md:justify-start md:gap-3.5 md:py-3 md:px-4 md:w-full group">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>Emergencia</span>
      </button>
      <button data-page="admin" id="navAdminBtn" class="flex flex-col items-center justify-center gap-1 py-1 px-3 text-[10px] md:text-sm font-medium text-slate-400 hover:text-slate-200 transition-all rounded-xl cursor-pointer flex-1 md:flex-none md:flex-row md:justify-start md:gap-3.5 md:py-3 md:px-4 md:w-full group hidden">
        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Administración</span>
      </button>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="pt-24 pb-28 px-4 md:pb-12 md:pl-72 md:pr-8 max-w-6xl mx-auto" id="mainContent">
    <!-- Dynamic SPA content injected here -->
  </main>

  <div class="toast-container fixed top-24 right-4 z-[100] flex flex-col gap-2.5 max-w-sm pointer-events-none" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
